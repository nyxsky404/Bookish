version: 2
updates:
  # Backend npm dependencies
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: 'chore(deps)'

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: 'chore(deps)'


  # Docker base images
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
